<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Play Icon -->
  <g>
    <!-- Gradient Definition -->
    <defs>
      <linearGradient id="playGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Play Button Circle -->
    <circle cx="25" cy="25" r="20" fill="url(#playGradient)" opacity="0.1"/>
    <circle cx="25" cy="25" r="18" fill="none" stroke="url(#playGradient)" stroke-width="2"/>
    
    <!-- Play Triangle -->
    <path d="M 20 16 L 20 34 L 34 25 Z" fill="url(#playGradient)"/>
    
    <!-- Sync Arrows -->
    <path d="M 35 20 Q 38 18, 41 20 L 40 18 M 41 20 L 40 22" 
          stroke="url(#playGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 41 30 Q 38 32, 35 30 L 36 32 M 35 30 L 36 28" 
          stroke="url(#playGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="55" y="32" font-family="'Inter', 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#1f2937">
    Play<tspan fill="#6366f1">Sync</tspan>
  </text>
</svg>